<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>🃏 Blackjack 21 🃏</h1>
            <div class="balance">
                <span>Balance: $<span id="balance">1000</span></span>
                <span>Bet: $<span id="current-bet">0</span></span>
            </div>
        </header>

        <div class="game-area">
            <!-- Dealer Section -->
            <div class="dealer-section">
                <h2>Dealer <span id="dealer-score"></span></h2>
                <div id="dealer-cards" class="cards-container"></div>
            </div>

            <!-- Player Section -->
            <div class="player-section">
                <h2>Player <span id="player-score"></span></h2>
                <div id="player-cards" class="cards-container"></div>
            </div>
        </div>

        <!-- Game Controls -->
        <div class="controls">
            <div class="betting-controls">
                <button id="bet-5" class="bet-btn">Bet $5</button>
                <button id="bet-10" class="bet-btn">Bet $10</button>
                <button id="bet-25" class="bet-btn">Bet $25</button>
                <button id="bet-50" class="bet-btn">Bet $50</button>
                <button id="clear-bet" class="bet-btn">Clear Bet</button>
            </div>

            <div class="game-controls">
                <button id="deal" class="game-btn">Deal</button>
                <button id="hit" class="game-btn" disabled>Hit</button>
                <button id="stand" class="game-btn" disabled>Stand</button>
                <button id="double-down" class="game-btn" disabled>Double Down</button>
            </div>
        </div>

        <!-- Game Status -->
        <div id="game-status" class="game-status"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
