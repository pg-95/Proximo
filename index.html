<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackjack</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <h1>♠ Blackjack ♣</h1>

  <div class="stats-bar">
    <div>Chips: <span id="chips">1000</span></div>
    <button id="stats-btn">Stats</button>
  </div>

  <div class="table">

    <h2>Dealer</h2>
    <div id="dealer-cards" class="cards"></div>
    <div id="dealer-score"></div>

    <h2>You</h2>
    <div id="player-cards" class="cards"></div>
    <div id="player-score"></div>

    <div class="buttons">
      <button id="hit">Hit</button>
      <button id="stand">Stand</button>
      <button id="new">New Hand</button>
    </div>

    <h3 id="message"></h3>
  </div>

  <div id="stats-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Player Stats</h2>

      <p>Hands Played: <span id="stat-hands">0</span></p>
      <p>Hands Won: <span id="stat-wins">0</span></p>
      <p>User Blackjacks: <span id="stat-user-bj">0</span></p>
      <p>Dealer Blackjacks: <span id="stat-dealer-bj">0</span></p>

      <button id="close-stats">Close</button>
    </div>
  </div>

  <footer>
    For entertainment purposes only. No real money wagering.
  </footer>

  <script src="script.js"></script>
</body>
</html>
